name: CI

on:
  push:
    branches:
      - main
      - "release/**"
  pull_request:
    branches:
      - main
      - "release/**"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"

      - name: Enable Corepack
        run: corepack enable

      - name: Install
        run: yarn install --immutable

      - name: Lint
        run: yarn lint

      - name: Type Check
        run: yarn typecheck

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Tests with Coverage
        run: yarn run test:all:coverage

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 30

      - name: Upload base coverage for PR comparison
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: base-coverage
          path: coverage/coverage-summary.json
          retention-days: 90
          overwrite: true

  coverage-report:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          name: coverage
          path: coverage/

      - name: Download base coverage from main
        uses: dawidd6/action-download-artifact@bf251b5aa9c2f7eeb574a96ee720e24f801b7c11 # v6
        with:
          name: base-coverage
          branch: main
          workflow: ci.yml
          path: base-coverage/
        continue-on-error: true
        id: base-download

      - name: Report coverage on PR
        uses: davelosert/vitest-coverage-report-action@2500dafcee7dd64f85ab689c0b83798a8359770e # v2
        with:
          json-summary-path: coverage/coverage-summary.json
          json-final-path: coverage/coverage-final.json
          json-summary-compare-path: ${{ steps.base-download.outcome == 'success' && 'base-coverage/coverage-summary.json' || '' }}

      - name: Enforce coverage rules
        if: steps.base-download.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          FAILED=0

          # 1. Check overall coverage didn't decrease
          BASE_LINES=$(jq '.total.lines.pct' base-coverage/coverage-summary.json)
          PR_LINES=$(jq '.total.lines.pct' coverage/coverage-summary.json)

          echo "Base coverage: ${BASE_LINES}%"
          echo "PR coverage:   ${PR_LINES}%"

          if [ "$(echo "$PR_LINES < $BASE_LINES" | bc -l)" -eq 1 ]; then
            echo "::error::Overall line coverage decreased from ${BASE_LINES}% to ${PR_LINES}%"
            FAILED=1
          fi

          # 2. Check changed source files have >= 95% line coverage
          CHANGED_FILES=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files --jq '.[].filename' \
            | grep -E '^src/.*\.(ts|tsx)$' \
            | grep -vE '\.(test|spec|stories)\.(ts|tsx)$' \
            | grep -vE '/index\.(ts|tsx)$') || true

          for file in $CHANGED_FILES; do
            PCT=$(jq -r --arg f "$file" '
              to_entries[]
              | select(.key | endswith($f))
              | .value.s
              | to_entries
              | if length == 0 then 100
                else ([.[].value] | (map(select(. > 0)) | length) / length * 100)
                end
            ' coverage/coverage-final.json 2>/dev/null)

            if [ -n "$PCT" ] && [ "$PCT" != "null" ]; then
              ROUNDED=$(echo "$PCT" | awk '{printf "%d", $1}')
              if [ "$ROUNDED" -lt 95 ]; then
                echo "::warning file=$file::Coverage is ${ROUNDED}% (required: 95%)"
                FAILED=1
              fi
            fi
          done

          if [ "$FAILED" -eq 1 ]; then
            echo "::error::Coverage checks failed. See above for details."
            exit 1
          fi

          echo "All coverage checks passed."
