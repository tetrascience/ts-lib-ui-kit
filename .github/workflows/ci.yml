name: CI

on:
  push:
    branches:
      - main
      - "release/**"
  pull_request:
    branches:
      - main
      - "release/**"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"

      - name: Enable Corepack
        run: corepack enable

      - name: Install
        run: yarn install --immutable

      - name: Lint
        run: yarn lint

      - name: Type Check
        run: yarn typecheck

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Tests with Coverage
        run: yarn run test:all:coverage

      # TODO: change back to @main after ts-ci-cd-lib PR #15 is merged
      - name: Upload coverage artifacts
        uses: tetrascience/ts-ci-cd-lib/coverage-upload@feat/coverage-report-workflow-v2

  coverage-report:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    needs: build
    permissions:
      contents: read
      pull-requests: write
    # TODO: change back to @main after ts-ci-cd-lib PR #15 is merged
    uses: tetrascience/ts-ci-cd-lib/.github/workflows/coverage-report.yml@feat/coverage-report-workflow-v2
    with:
      caller-workflow: ci.yml
