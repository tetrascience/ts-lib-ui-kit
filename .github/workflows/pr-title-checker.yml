name: "PR Title Checker"
on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - labeled
      - unlabeled

jobs:
  check:
    # Skip for forked PRs
    if: github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      pull-requests: read
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title for Jira ticket
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if [[ ! "$PR_TITLE" =~ ^[A-Z]+-[1-9][0-9]*:\ .+ ]]; then
            echo "::error::PR title must start with a Jira ticket number (e.g., 'SW-1234: Add Button component')"
            echo "Got: '$PR_TITLE'"
            echo "Expected pattern: PROJ-123: Description"
            exit 1
          fi
          echo "PR title is valid: '$PR_TITLE'"
