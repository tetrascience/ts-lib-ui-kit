name: Deploy Storybook PR Preview

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: storybook-preview-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-preview:
    name: Deploy Storybook PR Preview
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        if: github.event.action != 'closed'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"

      - name: Enable Corepack
        if: github.event.action != 'closed'
        run: corepack enable

      - name: Install dependencies
        if: github.event.action != 'closed'
        run: yarn install --immutable

      - name: Build Storybook preview
        if: github.event.action != 'closed'
        run: yarn build-storybook
        env:
          STORYBOOK_BASE_PATH: /${{ github.event.repository.name }}/pr-preview/pr-${{ github.event.pull_request.number }}/

      - name: Disable Jekyll processing
        if: github.event.action != 'closed'
        run: touch storybook-static/.nojekyll

      - name: Deploy preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: storybook-static
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: auto
          wait-for-pages-deployment: false
          qr-code: false
